<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Legends Ultimate Dashboard</title>
    <style>
        :root {
            --apex-red: #f0131e;
            --bg-dark: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --accent-blue: #00d2ff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid var(--apex-red);
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 2.5em; letter-spacing: 4px; font-style: italic; color: var(--apex-red); }

        /* ダッシュボード上部カード */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--apex-red);
        }

        .card h2 { margin: 0 0 10px 0; font-size: 0.85em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .val-large { font-size: 2em; font-weight: bold; color: var(--accent-blue); }
        .val-sub { font-size: 1.1em; margin-top: 5px; color: #fff; }
        .timer { font-family: monospace; font-size: 1.5em; color: #fff; background: #333; padding: 5px 10px; border-radius: 3px; display: inline-block; margin-top: 10px; }

        /* サーバーリストテーブル */
        .server-section { background: var(--card-bg); border-radius: 4px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--text-dim); font-size: 0.75em; padding: 15px; border-bottom: 2px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #2a2a2a; }

        .server-name { font-weight: bold; color: var(--apex-red); font-family: monospace; }
        .status-badge { padding: 4px 8px; border-radius: 3px; font-size: 0.8em; font-weight: bold; }
        .status-up { background: #1b4d2e; color: #44ff88; }
        .status-slow { background: #4d461b; color: #ffcc00; }
        
        /* ランク分布 */
        .rank-bar-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .rank-item { background: #333; padding: 5px 10px; border-radius: 15px; font-size: 0.8em; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>APEX LEGENDS STATUS</h1>
        <p style="color: var(--text-dim);">Real-time Server & Map Rotation Monitor</p>
    </header>

    <div class="stats-grid">
        <div class="card">
            <h2>Current Ranked Map</h2>
            <div id="current-map" class="val-large">Loading...</div>
            <div id="map-timer" class="timer">00:00:00</div>
            <div id="next-map" class="val-sub">Next: --</div>
        </div>

        <div class="card">
            <h2>Global Rank Distribution</h2>
            <div id="top-rank" class="val-large">--%</div>
            <div id="rank-summary" class="val-sub">Fetching population data...</div>
            <div id="rank-list" class="rank-bar-container"></div>
        </div>
    </div>

    <div class="server-section">
        <h2 style="font-size: 0.9em; color: var(--text-dim); padding-left: 15px;">REGIONAL SERVER STATUS</h2>
        <table>
            <thead>
                <tr>
                    <th>SERVER ID</th>
                    <th>LOCAL TIME</th>
                    <th>STABILITY</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="server-table">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 【重要】ここに取得したAPIキーを入力してください
    const API_KEY = "cbf1f28dc6ad36ad20ca95a6fcf5ebe4"; 
    const BASE_URL = "https://api.mozambiquehe.re";

    const servers = [
        { id: "ap-northeast-1", city: "Tokyo", zone: "Asia/Tokyo", apiAttr: "Origin_Login", region: "Asia" },
        { id: "us-west-2", city: "Oregon", zone: "America/Los_Angeles", apiAttr: "Origin_Login", region: "US-West" },
        { id: "eu-central-1", city: "Frankfurt", zone: "Europe/Berlin", apiAttr: "Origin_Login", region: "EU-Central" },
        { id: "ap-southeast-2", city: "Sydney", zone: "Australia/Sydney", apiAttr: "Origin_Login", region: "South-Pacific" }
    ];

    async function updateDashboard() {
        try {
            // 1. マップローテーション取得
            const mapRes = await fetch(`${BASE_URL}/maprotation?auth=${API_KEY}&version=2`);
            const mapData = await mapRes.json();
            renderMap(mapData.ranked);

            // 2. サーバー情報取得
            const serverRes = await fetch(`${BASE_URL}/servers?auth=${API_KEY}`);
            const serverData = await serverRes.json();
            renderServers(serverData);

            // 3. ランク分布取得
            const rankRes = await fetch(`${BASE_URL}/rank-dist?auth=${API_KEY}`);
            const rankData = await rankRes.json();
            renderRank(rankData);

        } catch (err) {
            console.error("Data Fetch Error:", err);
            document.getElementById('current-map').innerText = "API Error";
        }
    }

    function renderMap(data) {
        document.getElementById('current-map').innerText = data.current.map;
        document.getElementById('next-map').innerText = `Next: ${data.next.map}`;
        startMapTimer(data.current.remainingSec);
    }

    function startMapTimer(seconds) {
        let remaining = seconds;
        const timerEl = document.getElementById('map-timer');
        
        const countdown = setInterval(() => {
            if (remaining <= 0) {
                clearInterval(countdown);
                updateDashboard(); // 0になったら再取得
                return;
            }
            const h = Math.floor(remaining / 3600).toString().padStart(2, '0');
            const m = Math.floor((remaining % 3600) / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            timerEl.innerText = `${h}:${m}:${s}`;
            remaining--;
        }, 1000);
    }

    function renderServers(data) {
        const tbody = document.getElementById('server-table');
        tbody.innerHTML = '';

        servers.forEach(s => {
            // APIレスポンスから該当地域のステータスを抽出 (例: data.Origin_Login.Asia)
            const regionStatus = data[s.apiAttr][s.region] || { Status: "UNKNOWN" };
            const timeStr = new Date().toLocaleTimeString("ja-JP", { timeZone: s.zone, hour: '2-digit', minute: '2-digit' });
            
            const statusClass = regionStatus.Status === "UP" ? "status-up" : "status-slow";

            tbody.innerHTML += `
                <tr>
                    <td><span class="server-name">${s.id}</span><br><small>${s.city}</small></td>
                    <td>${timeStr}</td>
                    <td>
                        <div style="width:100px; height:6px; background:#333; border-radius:3px;">
                            <div style="width:${regionStatus.Status === "UP" ? '95%' : '40%'}; height:100%; background:var(--accent-blue); border-radius:3px;"></div>
                        </div>
                    </td>
                    <td><span class="status-badge ${statusClass}">${regionStatus.Status}</span></td>
                </tr>
            `;
        });
    }

    function renderRank(data) {
        // 例として「Gold」の割合を表示
        const goldDist = data.ranked.split2.find(r => r.name === "Gold");
        if(goldDist) {
            document.getElementById('top-rank').innerText = `${goldDist.percent.toFixed(1)}%`;
            document.getElementById('rank-summary').innerText = `Current Gold Population`;
        }

        const listEl = document.getElementById('rank-list');
        listEl.innerHTML = '';
        // 上位数件をタグ表示
        data.ranked.split2.slice(0, 5).forEach(r => {
            listEl.innerHTML += `<div class="rank-item">${r.name}: ${r.percent.toFixed(1)}%</div>`;
        });
    }

    // 初回起動
    if (API_KEY === "YOUR_API_KEY_HERE") {
        alert("index.html内の API_KEY を書き換えてください。");
    } else {
        updateDashboard();
        // 5分ごとに全体をリフレッシュ
        setInterval(updateDashboard, 300000);
    }
</script>

</body>
</html>
