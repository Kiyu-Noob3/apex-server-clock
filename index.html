<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Legends Server World Clock</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #eeeeee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #f0131e; border-bottom: 2px solid #f0131e; padding-bottom: 10px; font-size: 1.5rem; }
        
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 450px; /* さらに少しだけタイトにしました */
            background-color: #2a2a2a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 0.9rem;
        }
        th, td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        th { background-color: #f0131e; color: white; text-transform: uppercase; letter-spacing: 1px; }
        tr:hover { background-color: #333; }
        
        .server-id { font-weight: bold; color: #ff4d4d; font-family: monospace; }
        .time { font-family: 'Courier New', Courier, monospace; font-size: 1.2em; color: #00ffcc; white-space: nowrap; }

        /* 点滅用のスタイル：非表示のときも場所を確保するために visibility を使用 */
        .blink-colon {
            transition: opacity 0.1s;
        }
        .hidden {
            visibility: hidden;
        }
    </style>
</head>
<body>

    <h1>Apex Legends サーバー時刻ガイド</h1>
    
    <table>
        <thead>
            <tr>
                <th>サーバーID</th>
                <th>ロケーション</th>
                <th>現地時刻</th>
            </tr>
        </thead>
        <tbody id="clock-table"></tbody>
    </table>

    <script>
        const servers = [
            { id: "us-east-1", city: "北バージニア", zone: "America/New_York" },
            { id: "us-east-2", city: "オハイオ", zone: "America/New_York" },
            { id: "us-west-2", city: "オレゴン", zone: "America/Los_Angeles" },
            { id: "eu-central-1", city: "フランクフルト", zone: "Europe/Berlin" },
            { id: "sa-east-1", city: "サンパウロ", zone: "America/Sao_Paulo" },
            { id: "ap-northeast-1", city: "東京", zone: "Asia/Tokyo" },
            { id: "me-south-1", city: "バーレーン", zone: "Asia/Bahrain" },
            { id: "ap-southeast-2", city: "シドニー", zone: "Australia/Sydney" },
            { id: "ap-east-1", city: "香港", zone: "Asia/Hong_Kong" },
            { id: "ap-southeast-1", city: "シンガポール", zone: "Asia/Singapore" }
        ];

        function updateClocks() {
            const tableBody = document.getElementById('clock-table');
            const now = new Date();
            
            // 1秒ごとに点滅の状態を判定（偶数秒は表示、奇数秒は非表示）
            const isVisible = now.getSeconds() % 2 === 0;
            const colonHtml = isVisible ? ':' : '<span class="hidden">:</span>';

            let html = '';

            servers.forEach(server => {
                // 時と分を別々に取得して、間に点滅するコロンを挟む
                const hh = now.toLocaleString("ja-JP", { timeZone: server.zone, hour: '2-digit', hour12: false });
                const mm = now.toLocaleString("ja-JP", { timeZone: server.zone, minute: '2-digit' });

                html += `
                    <tr>
                        <td class="server-id">${server.id}</td>
                        <td>${server.city}</td>
                        <td class="time">${hh}${colonHtml}${mm}</td>
                    </tr>
                `;
            });

            tableBody.innerHTML = html;
        }

        // 1秒ごとに実行
        setInterval(updateClocks, 1000);
        updateClocks(); 
    </script>
</body>
</html>
