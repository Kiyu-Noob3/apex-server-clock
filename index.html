<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Legends Server World Clock</title>
    <style>
        :root {
            --apex-red: #f0131e;
            --bg-dark: #1a1a1a;
            --card-bg: #2a2a2a;
            --accent-green: #00ffcc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #eeeeee;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { 
            color: var(--apex-red); 
            border-bottom: 2px solid var(--apex-red); 
            padding-bottom: 10px; 
            font-size: 1.8rem;
            text-align: center;
            text-transform: uppercase;
        }

        /* --- レスポンシブ対応のテーブル設定 --- */
        .table-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            /* PCでは最大600px、スマホでは画面幅いっぱい */
            max-width: 600px; 
            background-color: var(--card-bg);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            font-size: 1rem;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #444;
        }

        th { 
            background-color: var(--apex-red); 
            color: white; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        /* スマホ向けの微調整 (画面幅が480px以下の場合) */
        @media (max-width: 480px) {
            body { padding: 10px; }
            h1 { font-size: 1.3rem; }
            th, td { padding: 10px 8px; font-size: 0.85rem; }
            .time { font-size: 1.1rem !important; }
        }

        tr:hover { background-color: #333; }
        
        .server-id { font-weight: bold; color: #ff4d4d; font-family: 'Consolas', monospace; }
        .time { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1.4rem; 
            color: var(--accent-green); 
            white-space: nowrap; 
            font-weight: bold;
        }

        .hidden { visibility: hidden; }
    </style>
</head>
<body>

    <h1>Apex Server World Clock</h1>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>SERVER ID</th>
                    <th>LOCATION</th>
                    <th>LOCAL TIME</th>
                </tr>
            </thead>
            <tbody id="clock-table"></tbody>
        </table>
    </div>

    <script>
        const servers = [
            { id: "us-east-1", city: "北バージニア", zone: "America/New_York" },
            { id: "us-east-2", city: "オハイオ", zone: "America/New_York" },
            { id: "us-west-2", city: "オレゴン", zone: "America/Los_Angeles" },
            { id: "eu-central-1", city: "フランクフルト", zone: "Europe/Berlin" },
            { id: "sa-east-1", city: "サンパウロ", zone: "America/Sao_Paulo" },
            { id: "ap-northeast-1", city: "東京", zone: "Asia/Tokyo" },
            { id: "me-south-1", city: "バーレーン", zone: "Asia/Bahrain" },
            { id: "ap-southeast-2", city: "シドニー", zone: "Australia/Sydney" },
            { id: "ap-east-1", city: "香港", zone: "Asia/Hong_Kong" },
            { id: "ap-southeast-1", city: "シンガポール", zone: "Asia/Singapore" }
        ];

        function updateClocks() {
            const tableBody = document.getElementById('clock-table');
            const now = new Date();
            
            // 0.5秒（500ミリ秒）ごとに点滅の状態を判定
            const isVisible = now.getMilliseconds() < 500;
            const colonHtml = isVisible ? ':' : '<span class="hidden">:</span>';

            let html = '';

            servers.forEach(server => {
                // 「時」を表示させないために en-US ロケールを使用
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: server.zone,
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });

                const parts = formatter.formatToParts(now);
                const hh = parts.find(p => p.type === 'hour').value;
                const mm = parts.find(p => p.type === 'minute').value;

                html += `
                    <tr>
                        <td class="server-id">${server.id}</td>
                        <td>${server.city}</td>
                        <td class="time">${hh}${colonHtml}${mm}</td>
                    </tr>
                `;
            });

            tableBody.innerHTML = html;
        }

        // 高速点滅を維持するため、250msごとに描画更新
        setInterval(updateClocks, 250);
        updateClocks(); 
    </script>
</body>
</html>
